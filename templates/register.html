{% extends "base.html" %}

{% block title %}Register — Foodie{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-5 mx-auto">
        <div class="foodie-card">
            <div class="card-body p-4 p-md-5">
                <h1 class="h3 foodie-page-heading mb-4">Create account</h1>
                <form method="POST" action="{{ url_for('register') }}" data-disable-on-submit>
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required autocomplete="username" autofocus>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required minlength="6" autocomplete="new-password">
                        <div class="form-text">At least 6 characters.</div>
                    </div>
                    <button type="submit" class="btn btn-foodie-primary w-100">Register</button>
                    <a href="{{ url_for('login') }}" class="btn btn-foodie-outline w-100 mt-2">Already have an account?</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
